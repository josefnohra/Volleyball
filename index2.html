<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JN League Tournament Hub</title>
<style>
:root{--bg:#f4f6f8;--card:#fff;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#f59e0b}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}
header{background:#111827;color:white;padding:26px 16px;text-align:center}header h1{margin:0;font-size:32px}header p{margin:8px 0 0;color:#d1d5db}
main{max-width:1200px;margin:0 auto;padding:20px 14px 50px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
button{background:var(--blue);color:white;border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}.debug{font-size:13px;color:var(--muted);white-space:pre-wrap;line-height:1.45}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.06);transition:.15s}
.card:hover,.card.active{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,.14)}.id{color:var(--blue);font-weight:900;font-size:13px}.card h3{margin:8px 0 10px;font-size:20px}.meta{color:var(--muted);font-size:13px;line-height:1.55}.badge{display:inline-block;margin-top:10px;padding:5px 9px;border-radius:99px;background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:800}
.details{display:none;margin-top:22px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 4px 14px rgba(0,0,0,.06)}.details.show{display:block}.details h2{margin:0 0 8px}
.infoBox{background:#f9fafb;border:1px solid var(--line);border-radius:12px;padding:13px;margin:14px 0;white-space:pre-wrap;line-height:1.55}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}.tab{background:#e5e7eb;color:#111827}.tab.active{background:var(--blue);color:white}.panel{display:none}.panel.show{display:block}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px}th,td{border-bottom:1px solid var(--line);padding:10px 8px;text-align:left;vertical-align:top}th{background:#f3f4f6;color:#374151;font-size:12px;text-transform:uppercase}
.finished{color:var(--green);font-weight:800}.live{color:var(--red);font-weight:800}.upcoming{color:var(--orange);font-weight:800}.empty{padding:14px;background:#f9fafb;border:1px dashed #d1d5db;border-radius:12px;color:var(--muted)}.error{padding:14px;background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;color:#9a3412}
@media(max-width:700px){header h1{font-size:25px}table{font-size:12px}th,td{padding:7px 5px}}
</style>
</head>
<body>
<header><h1>JN League Tournament Hub</h1><p>Live tournament info, schedule, scores, standings and rules</p></header>
<main>
<div class="topbar"><button onclick="loadAll()">Refresh Data</button><div id="debug" class="debug">Loading…</div></div>
<div id="cards" class="grid"></div>
<section id="details" class="details">
<h2 id="title"></h2><div id="basic" class="meta"></div><div id="info" class="infoBox"></div>
<div class="tabs"><button class="tab active" onclick="showTab(event,'schedulePanel')">Schedule / Scores</button><button class="tab" onclick="showTab(event,'standingsPanel')">Standings</button><button class="tab" onclick="showTab(event,'rulesPanel')">Rules</button></div>
<div id="schedulePanel" class="panel show"></div><div id="standingsPanel" class="panel"></div><div id="rulesPanel" class="panel"></div>
</section>
</main>
<script>
const SHEET_ID="1YFeT1lmYhi239tF69tCGJNiOMIpamLEUB-sJbcUXp-A";
const GIDS={Tournaments:"452859579",Schedule:"685832222",Standings:"1132857043",Rules:"1293352487"};
let DATA={Tournaments:[],Schedule:[],Standings:[],Rules:[]};let selectedID=null;
function esc(v){return String(v??"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s]))}
function keyClean(k){return String(k||"").trim().replace(/\s+/g,"").replace(/_/g,"").toLowerCase()}
function get(row,names){if(!row)return"";for(const n of names){if(row[n]!==undefined&&row[n]!=="")return row[n]}const keys=Object.keys(row);for(const n of names){const f=keys.find(k=>keyClean(k)===keyClean(n));if(f&&row[f]!=="")return row[f]}return""}
function parseCSV(text){const rows=[];let row=[],cell="",q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c=='"'&&q&&n=='"'){cell+='"';i++}else if(c=='"'){q=!q}else if(c==","&&!q){row.push(cell);cell=""}else if((c=="\n"||c=="\r")&&!q){if(c=="\r"&&n=="\n")i++;row.push(cell);if(row.some(x=>String(x).trim()!==""))rows.push(row);row=[];cell=""}else cell+=c}row.push(cell);if(row.some(x=>String(x).trim()!==""))rows.push(row);return rows}
function toObjects(rows){if(!rows.length)return[];const headers=rows[0].map(h=>String(h).trim());return rows.slice(1).map(r=>{const o={};headers.forEach((h,i)=>o[h]=(r[i]||"").trim());return o})}
async function fetchTab(tab){const gid=GIDS[tab];const urls=[`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`,`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}`];let last="";for(const base of urls){try{const res=await fetch(base+`&cache=${Date.now()}`);const text=await res.text();last=text.slice(0,120);const rows=parseCSV(text);const objects=toObjects(rows);if(rows.length&&rows[0].length){return{ok:true,rows:objects,headers:rows[0].join(" | ")}}}catch(err){last=String(err)}}return{ok:false,rows:[],headers:last}}
async function loadAll(){document.getElementById("debug").textContent="Loading sheet tabs…";const report=[];for(const tab of Object.keys(GIDS)){const result=await fetchTab(tab);DATA[tab]=result.rows;report.push(`${tab}: ${DATA[tab].length} rows ${result.ok?"OK":"FAILED"} | ${result.headers}`)}document.getElementById("debug").textContent=report.join("\n");renderCards();if(DATA.Tournaments.length&&!selectedID)selectTournament(get(DATA.Tournaments[0],["TournamentID","ID"]));else if(selectedID)selectTournament(selectedID)}
function renderCards(){const box=document.getElementById("cards");box.innerHTML="";const tournaments=DATA.Tournaments.filter(t=>get(t,["TournamentID","ID"]));if(!tournaments.length){box.innerHTML='<div class="error">No tournaments loaded. Check sharing and the Tournaments GID.</div>';return}tournaments.forEach(t=>{const id=get(t,["TournamentID","ID"]);const name=get(t,["TournamentName","Tournament Name","Name"]);const div=document.createElement("div");div.className="card"+(id===selectedID?" active":"");div.onclick=()=>selectTournament(id);div.innerHTML=`<div class="id">${esc(id)}</div><h3>${esc(name||"Tournament")}</h3><div class="meta">📅 ${esc(get(t,["Date"]))} &nbsp; ⏰ ${esc(get(t,["Time"]))}<br>📍 ${esc(get(t,["Location","Place","Venue"]))}<br>Courts: ${esc(get(t,["Courts"]))} | Format: ${esc(get(t,["Format"]))} | Sets: ${esc(get(t,["Sets","SetsPerMatch"]))}<br>Fee: ${esc(get(t,["Fee"]))}</div><span class="badge">${esc(get(t,["Status"])||"Open")}</span>`;box.appendChild(div)})}
function selectTournament(id){selectedID=id;renderCards();const t=DATA.Tournaments.find(x=>get(x,["TournamentID","ID"])===id)||{};const name=get(t,["TournamentName","Tournament Name","Name"]);document.getElementById("details").classList.add("show");document.getElementById("title").textContent=`${id} - ${name||"Tournament"}`;document.getElementById("basic").innerHTML=`Date: ${esc(get(t,["Date"]))} | Time: ${esc(get(t,["Time"]))} | Location: ${esc(get(t,["Location","Place","Venue"]))} | Courts: ${esc(get(t,["Courts"]))} | Format: ${esc(get(t,["Format"]))} | Sets: ${esc(get(t,["Sets","SetsPerMatch"]))}`;document.getElementById("info").textContent=get(t,["Info","Notes","TournamentInfo","Tournament Info","Details","Description"])||"No tournament info added yet.";renderSchedule(id);renderStandings(id);renderRules(id)}
function renderSchedule(id){const rows=DATA.Schedule.filter(r=>get(r,["TournamentID","ID"])===id);document.getElementById("schedulePanel").innerHTML=makeTable(["Round","Match","Court","Team A","Team B","Score","Sets","Points","Winner","Status"],rows.map(r=>[get(r,["Round"]),get(r,["Match"]),get(r,["Court"]),get(r,["TeamA","Team A"]),get(r,["TeamB","Team B"]),makeScore(r),`${get(r,["SetsA","Sets A"])}-${get(r,["SetsB","Sets B"])}`,`${get(r,["PointsA","Points A"])}-${get(r,["PointsB","Points B"])}`,get(r,["Winner"]),statusHTML(get(r,["Status"]))]))}
function renderStandings(id){const rows=DATA.Standings.filter(r=>get(r,["TournamentID","ID"])===id);document.getElementById("standingsPanel").innerHTML=makeTable(["Rank","Team","Played","Sets Won","Sets Lost","Points"],rows.map(r=>[get(r,["Rank"]),get(r,["Team"]),get(r,["Played"]),get(r,["Sets Won","SetsWon"]),get(r,["Sets Lost","SetsLost"]),get(r,["Points"])]))}
function renderRules(id){const rows=DATA.Rules.filter(r=>get(r,["TournamentID","ID"])===id);document.getElementById("rulesPanel").innerHTML=makeTable(["Title","Details"],rows.map(r=>[get(r,["Title","RuleTitle","Rule Title"]),get(r,["Details","RuleDetails","Rule Details"])]))}
function makeScore(r){const parts=[];for(let i=1;i<=5;i++){const a=get(r,[`S${i}A`,`Set${i}A`]);const b=get(r,[`S${i}B`,`Set${i}B`]);if(a||b)parts.push(`${a}-${b}`)}return parts.join(", ")}
function statusHTML(v){const s=String(v||"");const l=s.toLowerCase();if(l==="finished")return'<span class="finished">Finished</span>';if(l==="live")return'<span class="live">Live</span>';if(l==="upcoming")return'<span class="upcoming">Upcoming</span>';return esc(s)}
function makeTable(headers,rows){if(!rows.length)return'<div class="empty">No data yet.</div>';return`<table><thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c||""}</td>`).join("")}</tr>`).join("")}</tbody></table>`}
function showTab(event,id){document.querySelectorAll(".panel").forEach(p=>p.classList.remove("show"));document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));document.getElementById(id).classList.add("show");event.target.classList.add("active")}
loadAll();
</script>
</body>
</html>
